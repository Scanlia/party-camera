services:
  party-camera:
    build: .
    container_name: party-camera
    ports:
      - "8090:8080"
    volumes:
      - ./clips:/app/clips
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - STREAM_WIDTH=${STREAM_WIDTH:-1280}
      - STREAM_HEIGHT=${STREAM_HEIGHT:-720}
      - TARGET_FPS=${TARGET_FPS:-60}
      - RTSP_URL=rtsp://mediamtx:8554/party
    depends_on:
      - mediamtx
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: party-mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "8889:8888"   # HLS (browser fallback)
    environment:
      - MTX_PROTOCOLS=tcp
      - MTX_HLSVARIANT=lowLatency
    restart: unless-stopped
